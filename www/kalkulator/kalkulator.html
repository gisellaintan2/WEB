    <!-- KONTEN -->
    <main class="main">
      <div class="page-header">
        <div class="page-header-icon"><i data-feather="sliders"></i></div>
        <div>
          <h1 class="page-title">Kalkulator <span class="cyan">Kode Warna</span></h1>
          <p class="page-sub">Terjemahkan pita warna resistor 4-gelang menjadi nominal Ohm</p>
        </div>
      </div>

      <div class="kalkulator-container">
        <!-- Preview Section -->
        <div class="kalkulator-preview">
           <svg viewBox="0 0 100 40" width="100%" height="auto" style="max-width: 400px; display: block; margin: 0 auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));">
              <rect x="15" y="5" width="70" height="30" rx="6" fill="#f0d5a3"/>
              <rect id="calcB1" x="25" y="5" width="6" height="30" fill="#111"/>
              <rect id="calcB2" x="40" y="5" width="6" height="30" fill="#8b4513"/>
              <rect id="calcB3" x="55" y="5" width="6" height="30" fill="#cc0000"/>
              <rect id="calcB4" x="72" y="5" width="6" height="30" fill="#d4af37"/>
              <rect x="0" y="18" width="15" height="4" fill="#999"/>
              <rect x="85" y="18" width="15" height="4" fill="#999"/>
           </svg>
           <div id="calcResult" class="kalkulator-result">
              1.2 kΩ ± 5%
           </div>
        </div>
        
        <!-- Controls Section -->
        <div class="kalkulator-controls">
           <div class="calc-row">
              <label>Gelang 1 (Digit 1)</label>
              <div class="color-grid" id="gridB1"></div>
           </div>
           <div class="calc-row">
              <label>Gelang 2 (Digit 2)</label>
              <div class="color-grid" id="gridB2"></div>
           </div>
           <div class="calc-row">
              <label>Gelang 3 (Pengali)</label>
              <div class="color-grid" id="gridB3"></div>
           </div>
           <div class="calc-row">
              <label>Gelang 4 (Toleransi)</label>
              <div class="color-grid" id="gridB4"></div>
           </div>
        </div>
      </div>

    </main>
